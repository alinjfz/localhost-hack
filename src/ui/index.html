<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LocalMind — Offline AI Agent</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --accent: #58a6ff; --text: #e6edf3; --muted: #8b949e;
    --user-bg: #1f3a5f; --bot-bg: #1c2128;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

  header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), #a371f7); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  .offline-badge { margin-left: auto; font-size: 0.7rem; padding: 0.25rem 0.6rem; border-radius: 20px; background: #1a3a1a; color: #3fb950; border: 1px solid #238636; }

  #chat { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

  .msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.55; font-size: 0.9rem; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: var(--user-bg); align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.assistant { background: var(--bot-bg); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg .role { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }

  .thinking { color: var(--muted); font-style: italic; font-size: 0.85rem; }

  form { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; border-top: 1px solid var(--border); background: var(--surface); }
  textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.9rem; resize: none; font-family: inherit; min-height: 44px; max-height: 160px; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  button { background: var(--accent); color: #0d1117; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: opacity 0.15s; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:hover:not(:disabled) { opacity: 0.85; }

  #new-session { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; padding: 0.4rem 0.8rem; }
</style>
</head>
<body>
<header>
  <div class="logo">🧠</div>
  <h1>LocalMind</h1>
  <span class="offline-badge">● OFFLINE</span>
  <button id="new-session">New session</button>
</header>

<div id="chat">
  <div class="msg assistant"><div class="role">LocalMind</div>Hi! I'm running entirely offline on your device. I have persistent memory, can read/write local files, and run Python. How can I help?</div>
</div>

<form id="form">
  <textarea id="input" placeholder="Ask anything… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
  <button type="submit" id="send">Send</button>
</form>

<script>
  let sessionId = crypto.randomUUID();
  const chatEl = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  document.getElementById('new-session').onclick = () => {
    sessionId = crypto.randomUUID();
    chatEl.innerHTML = '<div class="msg assistant"><div class="role">LocalMind</div>New session started. Memory from previous sessions persists in my knowledge graph.</div>';
  };

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('form').requestSubmit(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = input.value.trim();
    if (!msg) return;

    appendMsg('user', 'You', msg);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const thinking = appendMsg('assistant', 'LocalMind', '⏳ Thinking…');
    thinking.classList.add('thinking');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: msg }),
      });
      const data = await res.json();
      thinking.remove();
      appendMsg('assistant', 'LocalMind', data.reply);
    } catch (err) {
      thinking.textContent = '❌ Error: ' + err.message;
      thinking.classList.remove('thinking');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  function appendMsg(role, label, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="role">${label}</div>${escHtml(text)}`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
